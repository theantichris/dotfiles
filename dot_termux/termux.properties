# Termux configuration. Apply changes with: termux-reload-settings

# Extra-keys row(s) above the soft keyboard, so a shell is usable on a touch
# keyboard. Two rows: navigation/modifiers on top, common shell symbols below.
extra-keys = [ \
  ['ESC','/','|','~','HOME','UP','END','PGUP'], \
  ['TAB','CTRL','ALT','-','LEFT','DOWN','RIGHT','PGDN'] \
]

# Long-press popup keys give quick access to a few more without more rows.
extra-keys-style = default
